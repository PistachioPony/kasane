<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasane — pill card prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #1a1f3c;
      --text:     #f5f0e8;
      --text-dim: #c8bfb0;
      --accent:   #b87333;
      --card-texture: url('images/fabric.jpg');
      --body-texture: url('images/fabdetail.jpg');
      --card-overlay-pct: 55%;
      --font-title: 'Alfa Slab One', serif;
      --font-body:  'Noto Sans JP', sans-serif;
      /* set by JS after layout: one card height + gap, the distance the
         demo hand drags */
      --slot: 52px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      background-image: var(--body-texture);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 12px;
    }

    /* Same texture-taming overlay the real game puts on every screen */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-color: color-mix(in srgb, var(--bg) 92%, transparent);
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      flex: 1;
      position: relative;
    }

    /* --- CONDENSED HEADER --- */
    .puzzle-header { text-align: center; margin-bottom: 14px; }

    .puzzle-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .puzzle-title {
      font-family: var(--font-title);
      font-size: 1.35rem;
      font-weight: normal;
      letter-spacing: 0.03em;
      text-shadow: 2px 2px 0px var(--accent);
      margin: 2px 0 4px;
    }

    .puzzle-instruction {
      font-size: 0.78rem;
      color: var(--text-dim);
      line-height: 1.35;
    }

    .attempts-left {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    .attempts-left span { color: var(--accent); font-weight: 700; }

    /* --- PILL CARDS --- */
    .card-list {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      width: 100%;
      background-color: color-mix(in srgb, var(--bg) 85%, white 15%);
      background-image: var(--card-texture);
      background-size: cover;
      background-position: center;
      border-radius: 10px;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;            /* if label+sub can't fit one line, wrap visibly */
      align-items: baseline;
      justify-content: center;
      column-gap: 7px;
      padding: 10px 14px;
      touch-action: none;         /* whole card is a drag surface; page doesn't scroll */
      user-select: none;
      -webkit-user-select: none;
      cursor: grab;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-color: color-mix(in srgb, var(--bg) var(--card-overlay-pct), transparent);
      border-radius: 8px;
    }

    .pill-label, .pill-sub { position: relative; z-index: 1; }

    .pill-label {
      font-family: var(--font-title);
      font-size: 0.88rem;
      font-weight: normal;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .pill-sub {
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    body.no-subs .pill-sub { display: none; }

    .card.dragging {
      cursor: grabbing;
      box-shadow: 0 18px 30px rgba(0, 0, 0, 0.45), 0 4px 10px rgba(0, 0, 0, 0.3);
      transform: scale(1.045) rotate(-1.4deg);
    }

    .card-placeholder {
      border: 2px dashed color-mix(in srgb, var(--text) 28%, transparent);
      background: color-mix(in srgb, var(--text) 4%, transparent);
    }
    .card-placeholder::before { content: none; }

    /* --- SUBMIT --- */
    .submit-bar { margin-top: auto; padding-top: 18px; text-align: center; }

    .btn-primary {
      font-family: var(--font-title);
      font-size: 0.95rem;
      color: var(--bg);
      background-color: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 12px 34px;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .proto-note {
      font-size: 0.62rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 8px;
      opacity: 0.7;
    }

    /* --- SUB-LABEL TOGGLE --- */
    .sub-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 50;
      font-family: var(--font-body);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      background: color-mix(in srgb, var(--bg) 80%, white 20%);
      border: 1px solid color-mix(in srgb, var(--text) 25%, transparent);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
    }

    /* --- TUTORIAL: hand + bubble --- */
    /* Sits over the card list, ignores all pointer events so the first
       real touch lands on a card underneath (and dismisses this). */
    #tutorial {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.35s ease;
    }
    #tutorial.done { opacity: 0; }

    .tutorial-hand {
      position: absolute;
      top: 6px;
      right: 12%;
      width: 52px;
      animation: demoHand 4.5s ease-in-out infinite;
      transform-origin: 50% 20%;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
    }

    .tutorial-bubble {
      position: absolute;
      top: calc(var(--slot) + 46px);
      right: 4%;
      max-width: 220px;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.35;
      padding: 12px 14px;
      border-radius: 12px;
      border-top-right-radius: 2px;
    }

    /* The demo choreography: hand fades in over the top card, presses,
       drags it down one slot (the card below slides up), releases, then
       drags it back home. Loops until the player touches anything. */
    @keyframes demoHand {
      0%, 6%    { opacity: 0; transform: translateY(0) scale(1); }
      13%       { opacity: 1; transform: translateY(0) scale(1); }
      20%       { opacity: 1; transform: translateY(0) scale(0.88); }
      48%       { opacity: 1; transform: translateY(var(--slot)) scale(0.88); }
      56%       { opacity: 1; transform: translateY(var(--slot)) scale(1); }
      63%       { opacity: 1; transform: translateY(var(--slot)) scale(0.88); }
      88%       { opacity: 1; transform: translateY(0) scale(0.88); }
      94%, 100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .demo-running .card:nth-child(1) {
      animation: demoCardA 4.5s ease-in-out infinite;
      z-index: 10;
    }
    .demo-running .card:nth-child(2) {
      animation: demoCardB 4.5s ease-in-out infinite;
    }

    @keyframes demoCardA {
      0%, 20%   { transform: none; box-shadow: none; }
      26%       { transform: scale(1.04); box-shadow: 0 14px 24px rgba(0,0,0,0.45); }
      48%       { transform: translateY(var(--slot)) scale(1.04); box-shadow: 0 14px 24px rgba(0,0,0,0.45); }
      56%       { transform: translateY(var(--slot)) scale(1); box-shadow: none; }
      63%       { transform: translateY(var(--slot)) scale(1.04); box-shadow: 0 14px 24px rgba(0,0,0,0.45); }
      88%       { transform: scale(1.04); box-shadow: 0 14px 24px rgba(0,0,0,0.45); }
      94%, 100% { transform: none; box-shadow: none; }
    }

    @keyframes demoCardB {
      0%, 26%   { transform: none; }
      46%       { transform: translateY(calc(-1 * var(--slot))); }
      64%       { transform: translateY(calc(-1 * var(--slot))); }
      86%, 100% { transform: none; }
    }
  </style>
</head>
<body>
  <button class="sub-toggle" id="sub-toggle">sub-labels: ON</button>

  <div class="wrap">
    <div class="puzzle-header">
      <p class="puzzle-count">Puzzle 4 of 5</p>
      <h2 class="puzzle-title">Into the Blue</h2>
      <p class="puzzle-instruction">Order these dyeing methods and innovations — earliest to most recent.</p>
      <p class="attempts-left">Attempts left: <span>3</span></p>
    </div>

    <div id="card-list" class="card-list">
      <!-- cards injected by JS -->
      <div id="tutorial">
        <svg class="tutorial-hand" viewBox="0 0 60 84" xmlns="http://www.w3.org/2000/svg">
          <!-- generic pointing hand: index finger up, curled fist below -->
          <path d="M30 2
                   c-4.4 0 -8 3.6 -8 8
                   v28
                   l-2.5 -2.2
                   c-3.2 -2.9 -8.2 -2.7 -11 0.6
                   c-2.6 3 -2.4 7.5 0.4 10.3
                   l14 14.3
                   c3.4 3.5 8 5.4 12.9 5.4
                   h6.2
                   c9.4 0 17 -7.6 17 -17
                   v-13.4
                   c0 -3.6 -2.9 -6.5 -6.5 -6.5
                   c-1.3 0 -2.6 0.4 -3.6 1.1
                   c-0.9 -2.3 -3.1 -3.9 -5.7 -3.9
                   c-1.3 0 -2.5 0.4 -3.5 1.1
                   c-0.9 -2.2 -3.1 -3.8 -5.7 -3.8
                   c-0.7 0 -1.4 0.1 -2 0.3
                   V10
                   c0 -4.4 -3.6 -8 -8 -8
                   z"
                fill="#f5f0e8" stroke="#1a1f3c" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <div class="tutorial-bubble">Drag the cards to place them in the correct order.</div>
      </div>
    </div>

    <div class="submit-bar">
      <button class="btn-primary" id="btn-submit">SUBMIT ORDER</button>
      <p class="proto-note">prototype — submit is not wired up</p>
    </div>
  </div>

  <script>
    // Real content from the "Into the Blue" puzzle, pre-shuffled.
    const items = [
      { id: 'rope',      label: 'Rope Dyeing',            sub: 'Bundle dip method' },
      { id: 'foam',      label: 'Foam Dyeing',            sub: 'Sustainable era' },
      { id: 'hank',      label: 'Hank Dyeing',            sub: 'Hand bundle method' },
      { id: 'slasher',   label: 'Slasher / Sheet Dyeing', sub: 'Continuous flat process' },
      { id: 'synthetic', label: 'Synthetic Indigo',       sub: 'Industrial era' },
      { id: 'garment',   label: 'Garment Dyeing',         sub: 'Post-construction' },
    ];

    const cardList = document.getElementById('card-list');
    const tutorial = document.getElementById('tutorial');

    // Insert cards before the tutorial overlay so it stays on top in DOM order.
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = item.id;
      card.innerHTML = `
        <span class="pill-label">${item.label}</span>
        <span class="pill-sub">· ${item.sub}</span>
      `;
      cardList.insertBefore(card, tutorial);
    });

    // Measure one slot (card height + list gap) so the demo animation
    // drags exactly one position regardless of font/screen differences.
    function setSlot() {
      const first = cardList.querySelector('.card');
      document.documentElement.style.setProperty('--slot', (first.offsetHeight + 8) + 'px');
    }
    setSlot();
    window.addEventListener('resize', setSlot);

    cardList.classList.add('demo-running');

    function dismissTutorial() {
      tutorial.classList.add('done');
      cardList.classList.remove('demo-running');
      document.removeEventListener('pointerdown', dismissTutorial);
    }
    document.addEventListener('pointerdown', dismissTutorial);

    // Sub-label toggle, so both versions can be compared on the phone.
    const subToggle = document.getElementById('sub-toggle');
    subToggle.addEventListener('click', () => {
      document.body.classList.toggle('no-subs');
      const off = document.body.classList.contains('no-subs');
      subToggle.textContent = 'sub-labels: ' + (off ? 'OFF' : 'ON');
      setSlot(); // card height may change
    });

    // --- WHOLE-CARD DRAG ---
    // Same mechanics as the real game's handle drag (float the card
    // fixed-position, dashed placeholder holds its slot), but pointerdown
    // lives on the entire card and there is no edge-scrolling — the whole
    // point of this layout is that nothing scrolls.
    let draggedCard = null;
    let pendingCard = null;
    let placeholder = null;
    let startX = 0, startY = 0;
    let grabOffsetX = 0, grabOffsetY = 0;
    const THRESHOLD = 8;

    function onPointerDown(e) {
      pendingCard = e.currentTarget;
      startX = e.clientX;
      startY = e.clientY;
    }

    function beginDrag() {
      draggedCard = pendingCard;
      pendingCard = null;

      const rect = draggedCard.getBoundingClientRect();
      grabOffsetX = startX - rect.left;
      grabOffsetY = startY - rect.top;

      placeholder = document.createElement('div');
      placeholder.className = 'card card-placeholder';
      placeholder.dataset.id = draggedCard.dataset.id;
      placeholder.style.height = rect.height + 'px';
      draggedCard.replaceWith(placeholder);
      document.body.appendChild(draggedCard);

      draggedCard.style.position = 'fixed';
      draggedCard.style.width = rect.width + 'px';
      draggedCard.style.left = rect.left + 'px';
      draggedCard.style.top = rect.top + 'px';
      draggedCard.style.zIndex = 1000;
      draggedCard.style.pointerEvents = 'none';
      draggedCard.classList.add('dragging');
    }

    function onPointerMove(e) {
      if (!pendingCard && !draggedCard) return;

      if (pendingCard && !draggedCard) {
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.sqrt(dx * dx + dy * dy) < THRESHOLD) return;
        beginDrag();
      }

      draggedCard.style.left = (e.clientX - grabOffsetX) + 'px';
      draggedCard.style.top = (e.clientY - grabOffsetY) + 'px';

      const below = document.elementFromPoint(e.clientX, e.clientY);
      const target = below?.closest('.card');

      if (target && target !== placeholder) {
        const rect = target.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
          cardList.insertBefore(placeholder, target);
        } else {
          cardList.insertBefore(placeholder, target.nextSibling);
        }
      }
    }

    function onPointerUp() {
      pendingCard = null;
      if (!draggedCard) return;

      draggedCard.classList.remove('dragging');
      draggedCard.style.position = '';
      draggedCard.style.width = '';
      draggedCard.style.left = '';
      draggedCard.style.top = '';
      draggedCard.style.zIndex = '';
      draggedCard.style.pointerEvents = '';

      placeholder.replaceWith(draggedCard);
      placeholder = null;
      draggedCard = null;
    }

    cardList.querySelectorAll('.card').forEach(card => {
      card.addEventListener('pointerdown', onPointerDown);
    });
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
    document.addEventListener('pointercancel', onPointerUp);
  </script>
</body>
</html>
